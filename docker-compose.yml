version: "3.8"

services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Model Puller (runs once to download gemma3:4b)
  ollama-pull:
    image: ollama/ollama
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "ollama pull gemma3:4b"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # Backend + Frontend App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skin_disease_app
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - BACKEND_URL=http://localhost:8000
    volumes:
      - ./model:/app/model
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
